<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小工程师 - 小学学习助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶部标题栏 -->
        <header class="app-header">
            <div class="header-content">
                <span class="header-logo">🔧</span>
                <h1 class="header-title">小小工程师</h1>
                <div class="header-right">
                    <span class="header-user" id="header-user" style="display:none;cursor:pointer;" onclick="App.switchTab('profile')">👋 <span id="header-user-name"></span></span>
                    <button class="grade-btn" onclick="App.showGradeSelector()">
                        <span id="current-grade">一年级</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main id="main-content" class="main-content">
        </main>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="learn">
                <span class="nav-icon">📖</span>
                <span class="nav-label">学</span>
            </button>
            <button class="nav-btn" data-tab="daily">
                <span class="nav-icon">📅</span>
                <span class="nav-label">每日任务</span>
            </button>
            <button class="nav-btn" data-tab="profile">
                <span class="nav-icon">📊</span>
                <span class="nav-label">我的画像</span>
            </button>
            <button class="nav-btn" data-tab="practice">
                <span class="nav-icon">🎯</span>
                <span class="nav-label">智能推练</span>
            </button>
            <button class="nav-btn" data-tab="workshop">
                <span class="nav-icon">🚀</span>
                <span class="nav-label">兴趣工坊</span>
            </button>
        </nav>
    </div>

    <!-- 语音播报按钮（学习页面使用，全局隐藏） -->
    <button id="speech-toggle" class="speech-toggle" style="display:none;" onclick="Speech.toggle()">
        <span id="speech-icon">🔊</span>
    </button>

    <!-- 年级选择弹窗 -->
    <div id="grade-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content grade-modal">
            <div class="modal-title">选择年级</div>
            <div class="grade-grid">
                <button class="grade-card" data-grade="1" onclick="App.selectGrade(1)">一年级</button>
                <button class="grade-card" data-grade="2" onclick="App.selectGrade(2)">二年级</button>
                <button class="grade-card" data-grade="3" onclick="App.selectGrade(3)">三年级</button>
                <button class="grade-card" data-grade="4" onclick="App.selectGrade(4)">四年级</button>
                <button class="grade-card" data-grade="5" onclick="App.selectGrade(5)">五年级</button>
                <button class="grade-card" data-grade="6" onclick="App.selectGrade(6)">六年级</button>
            </div>
            <button class="btn-secondary modal-close-btn" onclick="App.closeGradeSelector()">取消</button>
        </div>
    </div>

    <!-- 答题反馈弹窗 -->
    <div id="feedback-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content feedback-modal">
            <div id="feedback-icon" class="feedback-icon"></div>
            <div id="feedback-text" class="feedback-text"></div>
            <button class="btn-primary modal-close-btn" onclick="App.closeFeedback()">继续</button>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div id="hint-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content hint-modal">
            <div class="hint-icon">💡</div>
            <div id="hint-text" class="hint-text"></div>
            <button id="hint-speak-btn" class="btn-speak-small" onclick="Speech.speakHint()">🔊 再听一遍</button>
            <button class="btn-primary modal-close-btn" onclick="App.closeHint()">知道了</button>
        </div>
    </div>

    <!-- 成就弹窗 -->
    <div id="achievement-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content achievement-modal">
            <div class="achievement-icon">🏆</div>
            <div id="achievement-title" class="achievement-title"></div>
            <div id="achievement-desc" class="achievement-desc"></div>
            <button class="btn-primary modal-close-btn" onclick="App.closeAchievement()">太棒了！</button>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content login-modal">
            <div class="login-icon">👋</div>
            <div class="login-title">欢迎来到小小工程师</div>
            <div class="login-subtitle">请输入你的名字</div>
            <input type="text" id="login-name-input" class="login-input" placeholder="请输入你的名字" maxlength="10" onkeydown="if(event.key==='Enter') App.doLogin()">
            <div class="login-error" id="login-error" style="display:none;">请输入名字哦～</div>
            <button class="btn-primary login-btn" onclick="App.doLogin()">开始学习</button>
        </div>
    </div>

    <script src="js/data_chinese.js"></script>
    <script src="js/data_math.js"></script>
    <script src="js/data_english.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
